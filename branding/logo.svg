      <circle cx="96" cy="92" r="74" stroke="url(#ringStroke)" stroke-width="12"/>
      <circle cx="96" cy="92" r="88" stroke="#4983FF" stroke-opacity="0.16" stroke-width="4"/>
      <path d="M96 8V26" stroke="#4983FF" stroke-width="10" stroke-linecap="round"/>
      <path d="M96 158V176" stroke="#4983FF" stroke-width="10" stroke-linecap="round"/>
      <path d="M12 92H30" stroke="#4983FF" stroke-width="10" stroke-linecap="round"/>
      <path d="M162 92H180" stroke="#4983FF" stroke-width="10" stroke-linecap="round"/>
      <path d="M36.6 32.6L49.3 45.3" stroke="#4983FF" stroke-width="10" stroke-linecap="round"/>
      <path d="M142.7 138.7L155.4 151.4" stroke="#4983FF" stroke-width="10" stroke-linecap="round"/>
      <path d="M36.6 151.4L49.3 138.7" stroke="#4983FF" stroke-width="10" stroke-linecap="round"/>
      <path d="M142.7 45.3L155.4 32.6" stroke="#4983FF" stroke-width="10" stroke-linecap="round"/>
