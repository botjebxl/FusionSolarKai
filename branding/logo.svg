<svg width="960" height="240" viewBox="0 0 960 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">FusionSolarKai logo</title>
  <desc id="logoDesc">A blue solar energy emblem with a sun and lightning bolt, followed by the text FusionSolarKai.</desc>
  <defs>
    <linearGradient id="coreGlow" x1="38" y1="34" x2="182" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78A4FF"/>
      <stop offset="0.58" stop-color="#4983FF"/>
      <stop offset="1" stop-color="#245DDB"/>
    </linearGradient>
    <linearGradient id="ringStroke" x1="34" y1="34" x2="186" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8AB1FF"/>
      <stop offset="0.52" stop-color="#4983FF"/>
      <stop offset="1" stop-color="#2A64E8"/>
    </linearGradient>
    <linearGradient id="boltFill" x1="97" y1="54" x2="143" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6FAFF"/>
      <stop offset="0.4" stop-color="#DCE8FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="14" y="14" width="192" height="192" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#2A4FA6" flood-opacity="0.18"/>
    </filter>
  </defs>

